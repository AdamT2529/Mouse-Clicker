<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Clicker</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            position: relative;
            font-family: Arial, sans-serif;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #UpgradeButton {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        #mainArea {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #myText {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="myText">Mouse Clicks: 0</div>
    <button id="UpgradeButton">Upgrade Clicker (20 clicks)</button>

    <div id="mainArea">
        <button id="myButton">Click This</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
